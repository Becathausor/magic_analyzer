<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Deck Analyzer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="layout">
    <nav id="decklist-nav" class="sidebar">
      <h1>Decklists</h1>
      <ul id="decklist-list"></ul>
    </nav>
    <main id="deck-view" class="deck-view">
      <p class="placeholder">Select a decklist to view its cards.</p>
    </main>
    <aside id="analysis-panel" class="analysis-panel">
      <p class="placeholder">Select a decklist to analyze it.</p>
    </aside>
  </div>

  <div id="tooltip" class="tooltip hidden"></div>

  <script src="app.js"></script>
</body>
</html>
